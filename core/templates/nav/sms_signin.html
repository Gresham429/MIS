<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机号登录</title>
    <link rel="stylesheet" href="../../static/css/nav/sms_sign.css"> <!-- 引入样式表 -->
    <!-- <script src="../../static/js/src/sms_signin.js"></script> -->
</head>

<body>
    <div class="login-container">
        <h1>登录</h1>

        <form id="loginForm" action="" method="POST">
            <!-- 登录表单 -->
            {% csrf_token %}
            <div class="form-group">
                <label for="phonenumber">手机号:</label>
                <input type="phonenumber" name="phonenumber" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label>短信验证码:</label>
                <div class="sms">
                    <button type="submit" name="send_sms", id="sendSmsButton">发送短信验证码</button>
                    <input type="text" name="sms" id="sms" placeholder="请输入验证码">
                </div>
            </div>
            <div class="form-group">
                <button type="submit" class="down">登录</button>
            </div>
  
        </form>
        <div id="messageBox"></div>
        <p>
            <a href="{% url 'sign_in' %}"><button type="submit" class="down">用户名密码登录</button></a>
        </p>

        <a href="{% url 'homepage_index' %}">
            <button class="down">回到首页</button>
        </a>
    </div>
</body>

</html>
